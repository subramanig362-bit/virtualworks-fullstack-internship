<!DOCTYPE html>
<html>
<head>
    <title>Quote Generator</title>
    <link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/4149/4149673.png">
</head>
<body>

<div class="container">

    <h1>✨ Quote Generator</h1>

    <a href="/generate">
        <button>
            Generate New Quote
        </button>
    </a>

    <h2>📜 Quote History</h2>

    {% for quote in history %}

    {% for quote in history %}

<div class="card">

    <p class="quote">
        ❝ {{ quote[0] }} ❞
    </p>

    <p class="author">
        — {{ quote[1] }}
    </p>

    <small>
        🕒 {{ quote[2] }}
    </small>

</div>

{% endfor %}

    {% endfor %}

</div>

</body>
</html>
